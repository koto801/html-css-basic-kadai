<!DOCTYPE html>
<html>
<head>
  <title>8章課題</title>
  <meta name="description" content="このページは8章の課題です。">
  <meta charset="UTF-8">
</head>
<body>
  <header>
    <h1>SAMURAIニュース</h1>
    <nav>
      <ul>
        <li><a href="https://www.sejuku.net/">ホーム</a></li>
        <li><a href="https://www.sejuku.net/">社会</a></li>
        <li><a href="https://www.sejuku.net/">経済</a></li>
        <li><a href="https://www.sejuku.net/">スポーツ</a></li>
        <li><a href="https://www.sejuku.net/">テクノロジー</a></li>
      </ul>
    </nav>
  </header>
  <main>
    <article>
      <h2>社会</h2>
      <section>
        <h3>和菓子店も「トリックオアトリート！」</h3>
        <p>日本でも年々人気の高まるハロウィン。<br>今年は大手和菓子店5社がハロウィン向けの和菓子セットを共同開発しました。</p>
        <audio src="kadai_008_ichi.mp3" controls></audio>
      </section>
      <section>
        <h3>私のおすすめ和菓子アンケートフォーム</h3>
        <form>
          <p>
            <label for="name">氏名</label><br>
            <input type="text" id="name" name="name" placeholder="名前を入力してください">
          </p>
          <p>
            <label for="age">年代</label><br>
            <select id="age" name="age">
              <option value="10代以下">10代以下</option>
              <option value="20代">20代</option>
              <option value="30代">30代</option>
              <option value="40代以上">40代以上</option>
            </select>
          </p>
          <p>
            <label>性別</label><br>
            <label><input type="radio" name="gender" value="male">男性</label>
            <label><input type="radio" name="gender" value="female">女性</label>
            <label><input type="radio" name="gender" value="other">その他</label>
          </p>
          <p>
            <label for="wagashi">おすすめ和菓子の名称</label><br>
            <input type="text" id="wagashi" name="wagashi" placeholder="例：みたらし団子">
          </p>
          <p>
            <label for="reason">おすすめする理由</label><br>
            <textarea id="reason" name="reason"></textarea>
          </p>
          <p>
            <label>
              <input type="checkbox" name="privacy" value="agree">個人情報保護方針に同意する
            </label>
          </p>
          <p>
            <button type="submit">送信</button>
            <button type="reset">リセット</button>
          </p>
        </form>
      </section>
    </article>
    <article>
      <h2>テクノロジー</h2>
      <section>
        <h3>SAMURAIが新しい動画をリリース</h3>
        <p>SAMURAI公式YouTubeで新しい動画がリリースされました。<br>動画の内容はHTML/CSSの解説です。</p>
      </section>
    </article>
  </main>
  <footer>
    <p>&copy;SAMURAIニュース</p>
  </footer>
</body>
</html>
